<!DOCTYPE html>
<html>
<head>
    <title>Trash AI</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f5f5f5;
            padding: 50px;
        }

        .box {
            background: white;
            padding: 30px;
            border-radius: 12px;
            display: inline-block;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        button {
            padding: 10px 20px;
            margin-top: 15px;
            cursor: pointer;
        }

        #result {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
            color: #2c3e50;
        }

        img {
            margin-top: 15px;
            max-width: 200px;
        }
        button {
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 6px;
        }
.box {
    max-width: 400px;
}
    </style>
</head>

<body>

<div class="box">
    <h2>🗑️ 垃圾分類 AI</h2>

    <input type="file" id="fileInput">
    <br>

    <button onclick="upload()">開始預測</button>

    <div>
        <img id="preview" />
    </div>

    <div id="result"></div>
    <div id="barContainer" style="width:200px;margin:10px auto;">
    <div id="bar" style="height:10px;background:#ddd;border-radius:5px;">
        <div id="barFill" style="height:10px;width:0%;background:green;border-radius:5px;"></div>
    </div>
</div>
</div>

<script>
function previewImage() {
    const file = document.getElementById("fileInput").files[0];
    const reader = new FileReader();

    reader.onload = function(e) {
        document.getElementById("preview").src = e.target.result;
    }

    reader.readAsDataURL(file);
}

document.getElementById("fileInput").addEventListener("change", previewImage);

async function upload() {
    const file = document.getElementById("fileInput").files[0];

    const formData = new FormData();
    formData.append("image", file);

    // 🔥 ① loading（送出前）
    document.getElementById("result").innerText = "辨識中...🤖";
    document.getElementById("barFill").style.width = "0%";

    const res = await fetch("/predict", {
        method: "POST",
        body: formData
    });

    const data = await res.json();

    // 🔥 ② 顯示結果
    document.getElementById("result").innerHTML =
        "結果：<b>" + data.result + "</b><br>" +
        "信心度：" + data.confidence + "%";

    document.getElementById("barFill").style.width =
        data.confidence + "%";
}
</script>

</body>
</html>
